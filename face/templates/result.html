<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 8px;
            font-size: 16px;
            color: #555;
        }
        input, select {
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TBD</h1>


        <h2></h2>
        <table id="studentTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Date</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody>
                <!-- Student details will appear here -->
            </tbody>
        </table>
    </div>

    <script>
        // Function to get stored student data from localStorage
        function loadStudentData() {
            const students = JSON.parse(localStorage.getItem('students')) || [];
            const tableBody = document.querySelector("#studentTable tbody");
            tableBody.innerHTML = ''; // Clear current table rows

            students.forEach(student => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${student.name}</td>
                    <td>${student.age}</td>
                    <td>${student.class}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Handle form submission
        document.getElementById('studentForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent form submission and page reload

            // Get values from form fields
            const name = document.getElementById('name').value;
            const age = document.getElementById('age').value;
            const studentClass = document.getElementById('class').value;

            // Store the data in localStorage
            const students = JSON.parse(localStorage.getItem('students')) || [];
            students.push({ name, age, class: studentClass });
            localStorage.setItem('students', JSON.stringify(students));

            // Clear the form
            document.getElementById('studentForm').reset();

            // Reload the student data in the table
            loadStudentData();
        });

        // Load the student data when the page is loaded
        window.onload = loadStudentData;
    </script>

</body>
</html>
