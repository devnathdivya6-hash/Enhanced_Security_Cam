{% load static %}
{% include 'header.html' %}

<h2>Messages & Responses</h2>

{% for message in messages %}
    <div class="message-box">
        <p><strong>Message:</strong> {{ message.message }}</p>

        {% if message.response %}
            <p><strong>Response:</strong> {{ message.response }}</p>
        {% else %}
            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="message_id" value="{{ message.id }}">
                <textarea name="response_text" placeholder="Enter your response here..." required></textarea>
                <button type="submit">Submit Response</button>
            </form>
        {% endif %}
    </div>
{% endfor %}

{% include 'footer.html' %}
